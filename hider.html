<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#09090f">
  <title>JLTG — Hider</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="toast"></div>

  <div class="modal-overlay" id="card-modal">
    <div class="modal" id="card-modal-body"></div>
  </div>

  <div class="topbar">
    <span class="topbar-title bebas">🕵️ Hider</span>
    <span class="topbar-sub mono" id="timer-display">——:——</span>
  </div>
  <div class="timer-bar-wrap"><div class="timer-bar" id="timer-bar" style="width:100%"></div></div>

  <div class="scroll-area">
    <div id="status-chips" style="display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem"></div>
    <div id="question-panel"></div>
    <div id="gps-panel"></div>
    <div>
      <div class="input-label" style="margin-bottom:.6rem">🃏 Deck (<span id="hand-count">0</span> Karten)</div>
      <div class="hand-grid" id="hand-grid"></div>
    </div>
    <div class="divider"></div>
    <button class="btn btn-red btn-sm" id="btn-end" style="width:auto">⏹ Spiel beenden</button>
  </div>

  <script type="module">
    import { supabase } from '/js/supabase.js';
    import { CARDS, QUESTIONS, CATEGORY_RULES } from '/js/data.js';
    import { showToast, $, formatTime, catColor, catIcon, questionColor, questionEmoji } from '/js/utils.js';
    import { startTracking } from '/js/gps.js';

    const code = location.pathname.split('/').pop().toUpperCase();
    const playerId = localStorage.getItem('jltg_player_id');

    let session = null, hand = [], question = null, cardOffers = [];
    let timerInterval = null;

    // ── INIT ──────────────────────────────────────────────────────────
    async function init() {
      const { data: s } = await supabase.from('sessions').select('*').eq('room_code', code).single();
      if (!s) { location.href = '/'; return; }
      if (s.status === 'ended') { location.href = `/end/${code}`; return; }
      if (s.status !== 'running') { location.href = `/lobby/${code}`; return; }
      session = s;

      const { data: me } = await supabase.from('players').select('role').eq('id', playerId).single();
      if (me?.role !== 'hider') { location.href = `/seeker/${code}`; return; }

      await Promise.all([loadHand(), loadQuestion(), loadPlayers()]);
      startTimer();
      startTracking(playerId);
      subscribe();
    }

    // ── TIMER ─────────────────────────────────────────────────────────
    function startTimer() {
      const started = new Date(session.time_started).getTime();
      const totalSec = session.hiding_duration_min * 60;
      function tick() {
        const elapsed = Math.floor((Date.now() - started) / 1000);
        const remaining = Math.max(0, totalSec - elapsed);
        $('timer-display').textContent = formatTime(remaining);
        $('timer-bar').style.width = `${(remaining / totalSec) * 100}%`;
        if (remaining === 0) endGame();
      }
      tick();
      timerInterval = setInterval(tick, 1000);
    }

    // ── LOAD ──────────────────────────────────────────────────────────
    async function loadHand() {
      const { data } = await supabase.from('deck').select('*')
        .eq('session_id', session.id).eq('status', 'hand').order('created_at');
      hand = data || [];
      renderHand();
    }

    async function loadQuestion() {
      const { data } = await supabase.from('questions').select('*')
        .eq('session_id', session.id)
        .not('status', 'in', '("answered","vetoed","cards_drawn")')
        .order('created_at', { ascending: false }).limit(1);
      question = data?.[0] || null;
      if (question?.status === 'pending') {
        const { data: offers } = await supabase.from('card_offers')
          .select('*').eq('question_id', question.id);
        cardOffers = offers || [];
      } else { cardOffers = []; }
      renderQuestion();
    }

    async function loadPlayers() {
      const { data } = await supabase.from('players').select('*').eq('session_id', session.id);
      renderGPS(data || []);
    }

    // ── RENDER HAND ───────────────────────────────────────────────────
    function renderHand() {
      const bonusTotal = hand.filter(c => c.card_category === 'timebonus').reduce((s,c) => s+(c.card_value||0), 0);
      $('status-chips').innerHTML = `
        <span class="badge badge-green">+${bonusTotal} min im Deck</span>
        <span class="badge badge-muted">${hand.length} Karten</span>
        ${question?.status === 'pending' ? `<span class="badge badge-orange pulsing">❓ Frage offen</span>` : ''}
      `;
      $('hand-count').textContent = hand.length;
      $('hand-grid').innerHTML = hand.map(c => `
        <div class="card-chip badge-${catColor(c.card_category)}" data-id="${c.id}" title="${c.card_text}">
          ${catIcon(c.card_category)} ${c.card_name}
        </div>`).join('');
      $('hand-grid').querySelectorAll('.card-chip').forEach(el =>
        el.addEventListener('click', () => openCardModal(el.dataset.id)));
    }

    // ── RENDER GPS ────────────────────────────────────────────────────
    function renderGPS(players) {
      const seekers = players.filter(p => p.role === 'seeker');
      $('gps-panel').innerHTML = seekers.length ? `
        <div class="card" style="margin-bottom:.75rem">
          <div class="input-label" style="margin-bottom:.5rem">📍 Seeker Standorte</div>
          ${seekers.map(s => `
            <div style="display:flex;justify-content:space-between;align-items:center;padding:.4rem 0;border-bottom:1px solid var(--border)">
              <span style="font-weight:600;font-size:.85rem">🔍 ${s.name}</span>
              <span style="font-size:.72rem;color:var(--muted)">${s.lat ? `${s.lat.toFixed(4)}, ${s.lng.toFixed(4)}` : 'kein GPS'}</span>
            </div>`).join('')}
        </div>` : '';
    }

    // ── RENDER QUESTION ───────────────────────────────────────────────
    function renderQuestion() {
      const q = question;
      if (!q) {
        $('question-panel').innerHTML = `
          <div class="card" style="text-align:center;padding:1.5rem;margin-bottom:.75rem;color:var(--muted)">
            <div style="font-size:1.5rem;margin-bottom:.25rem">💤</div>
            <div>Warte auf Frage der Seeker</div>
          </div>`; return;
      }
      const qc = questionColor(q.category);
      const qe = questionEmoji(q.category);

      if (q.status === 'pending') {
        $('question-panel').innerHTML = `
          <div class="card card-${qc}" style="margin-bottom:.75rem">
            <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.75rem">
              <span class="badge badge-${qc}">${qe} ${q.category}</span>
              <span style="font-size:.7rem;color:var(--muted)">Wähle ${q.keep_count} von ${q.draw_count}</span>
            </div>
            <div style="font-size:.95rem;font-weight:600;line-height:1.4;margin-bottom:1rem">${q.question_text}</div>

            <div class="input-label" style="margin-bottom:.5rem">Karten wählen</div>
            <div id="offers-list">
              ${cardOffers.map(o => `
                <div class="offer-card" data-oid="${o.id}">
                  <span class="badge badge-${catColor(o.card_category)}">${catIcon(o.card_category)} ${o.card_category}</span>
                  <div class="offer-name">${o.card_name}</div>
                  <div class="offer-text">${o.card_text}</div>
                </div>`).join('')}
            </div>
            <button class="btn btn-orange btn-sm" id="btn-confirm" style="margin-top:.5rem;width:auto" disabled>
              Bestätigen (0/${q.keep_count})
            </button>

            <div class="divider"></div>
            <div class="input-label" style="margin-bottom:.5rem">Antwort</div>
            ${q.category === 'yellow' ? `
              <input type="file" id="photo-input" accept="image/*" capture="environment" style="display:none">
              <button class="btn btn-surface btn-sm" id="btn-photo" style="width:auto">📷 Foto hochladen</button>
              <div id="photo-preview" style="margin-top:.5rem"></div>
            ` : `
              <div class="btn-row">
                <button class="btn btn-green btn-sm" id="btn-yes">✓ Ja</button>
                <button class="btn btn-red btn-sm" id="btn-no">✗ Nein</button>
              </div>`}
            ${hand.some(c => c.card_category === 'veto') ? `
              <button class="btn btn-surface btn-sm" id="btn-veto" style="margin-top:.5rem;width:auto">🛡️ Veto spielen</button>
            ` : ''}
          </div>`;
        attachQuestionListeners(q);
        return;
      }

      if (q.status === 'answered') {
        $('question-panel').innerHTML = `
          <div class="card ${q.answer ? 'card-green' : 'card-red'}" style="margin-bottom:.75rem;text-align:center;padding:1.25rem">
            <div style="font-size:1.4rem;font-weight:700">${q.answer ? '✅ Ja' : '❌ Nein'}</div>
            ${q.photo_url ? `<img src="${q.photo_url}" style="max-width:100%;border-radius:8px;margin-top:.75rem">` : ''}
            <div style="font-size:.75rem;color:var(--muted);margin-top:.5rem">Beantwortet</div>
          </div>`; return;
      }

      if (q.status === 'vetoed') {
        $('question-panel').innerHTML = `
          <div class="card card-purple" style="margin-bottom:.75rem;text-align:center;padding:1.25rem">
            <div style="font-size:1.4rem">🛡️ Veto!</div>
            <div style="font-size:.75rem;color:var(--muted);margin-top:.4rem">Frage geblockt</div>
          </div>`; return;
      }

      $('question-panel').innerHTML = '';
    }

    // ── QUESTION LISTENERS ────────────────────────────────────────────
    function attachQuestionListeners(q) {
      let selected = new Set();

      document.querySelectorAll('.offer-card').forEach(el => {
        el.addEventListener('click', () => {
          const id = el.dataset.oid;
          if (selected.has(id)) { selected.delete(id); el.classList.remove('selected'); }
          else if (selected.size < q.keep_count) { selected.add(id); el.classList.add('selected'); }
          const btn = $('btn-confirm');
          btn.disabled = selected.size !== q.keep_count;
          btn.textContent = `Bestätigen (${selected.size}/${q.keep_count})`;
        });
      });

      $('btn-confirm')?.addEventListener('click', async () => {
        $('btn-confirm').disabled = true;
        // add chosen cards to deck
        const { data: offers } = await supabase.from('card_offers').select('*').in('id', [...selected]);
        await supabase.from('card_offers').update({ chosen: true }).in('id', [...selected]);
        await supabase.from('deck').insert((offers||[]).map(o => ({
          session_id: session.id, card_id: o.card_id, card_category: o.card_category,
          card_name: o.card_name, card_text: o.card_text, card_value: o.card_value, status: 'hand'
        })));
        await supabase.from('questions').update({ status: 'cards_drawn' }).eq('id', q.id);
      });

      $('btn-yes')?.addEventListener('click', () => answer(true));
      $('btn-no')?.addEventListener('click',  () => answer(false));

      $('btn-photo')?.addEventListener('click', () => $('photo-input')?.click());
      $('photo-input')?.addEventListener('change', async e => {
        const file = e.target.files[0]; if (!file) return;
        showToast('📤 Hochladen...');
        try {
          const path = `${session.id}/${Date.now()}_${file.name}`;
          await supabase.storage.from('jltg-photos').upload(path, file);
          const { data: u } = supabase.storage.from('jltg-photos').getPublicUrl(path);
          $('photo-preview').innerHTML = `<img src="${u.publicUrl}" style="max-width:100%;border-radius:8px">`;
          await answer(true, u.publicUrl);
        } catch { showToast('Upload fehlgeschlagen ❌'); }
      });

      $('btn-veto')?.addEventListener('click', async () => {
        if (!confirm('Veto spielen? Eine Veto-Karte wird verbraucht.')) return;
        const vc = hand.find(c => c.card_category === 'veto');
        if (!vc) { showToast('Kein Veto im Deck!'); return; }
        await supabase.from('deck').update({ status:'played', played_at: new Date().toISOString() }).eq('id', vc.id);
        await supabase.from('questions').update({ status:'vetoed' }).eq('id', q.id);
      });
    }

    async function answer(val, photoUrl = null) {
      await supabase.from('questions')
        .update({ status:'answered', answer: val, photo_url: photoUrl })
        .eq('id', question.id);
    }

    // ── CARD MODAL ────────────────────────────────────────────────────
    function openCardModal(deckId) {
      const c = hand.find(x => x.id === deckId); if (!c) return;
      $('card-modal-body').innerHTML = `
        <div class="modal-handle"></div>
        <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.75rem">
          <span style="font-size:1.5rem">${catIcon(c.card_category)}</span>
          <div>
            <div style="font-weight:700">${c.card_name}</div>
            <span class="badge badge-${catColor(c.card_category)}">${c.card_category}</span>
          </div>
        </div>
        <div style="font-size:.9rem;line-height:1.6;margin-bottom:1rem;color:var(--dim)">${c.card_text}</div>
        <div class="btn-row">
          <button class="btn btn-orange" id="modal-play">🃏 Spielen</button>
          <button class="btn btn-ghost" id="modal-close">Schließen</button>
        </div>`;
      $('card-modal').classList.add('open');
      $('modal-play').onclick = async () => {
        $('card-modal').classList.remove('open');
        await supabase.from('deck').update({ status:'played', played_at: new Date().toISOString() }).eq('id', deckId);
        showToast(`🃏 ${c.card_name} gespielt!`);
      };
      $('modal-close').onclick = () => $('card-modal').classList.remove('open');
    }
    $('card-modal').addEventListener('click', e => { if (e.target === e.currentTarget) e.currentTarget.classList.remove('open'); });

    // ── END GAME ──────────────────────────────────────────────────────
    async function endGame() {
      clearInterval(timerInterval);
      const bonusMin = hand.filter(c => c.card_category === 'timebonus').reduce((s,c) => s+(c.card_value||0), 0);
      await supabase.from('sessions').update({
        status:'ended', time_ended: new Date().toISOString(), bonus_time_min: bonusMin
      }).eq('id', session.id);
      location.href = `/end/${code}`;
    }

    $('btn-end').onclick = () => { if (confirm('Spiel wirklich beenden?')) endGame(); };

    // ── REALTIME ──────────────────────────────────────────────────────
    function subscribe() {
      supabase.channel(`hider:${session.id}`)
        .on('postgres_changes', { event:'*', schema:'public', table:'questions', filter:`session_id=eq.${session.id}` },
          () => loadQuestion())
        .on('postgres_changes', { event:'*', schema:'public', table:'deck', filter:`session_id=eq.${session.id}` },
          () => loadHand())
        .on('postgres_changes', { event:'*', schema:'public', table:'players', filter:`session_id=eq.${session.id}` },
          () => loadPlayers())
        .on('postgres_changes', { event:'UPDATE', schema:'public', table:'sessions', filter:`id=eq.${session.id}` },
          p => { if (p.new.status === 'ended') location.href = `/end/${code}`; })
        .subscribe();
    }

    init();
  </script>
</body>
</html>
